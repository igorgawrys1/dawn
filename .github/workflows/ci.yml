name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Pint & PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - uses: ramsey/composer-install@v3

      - name: Pint
        run: vendor/bin/pint --test

      - name: PHPStan (max level)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: No sleeps outside the documented waitUsing exception
        run: |
          ! grep -rn --include='*.php' -E '\b(u?sleep)\(' src/ | grep -v 'src/Support/' || {
            echo 'Found PHP-side sleeping outside Dawn\Support - forbidden by design.'; exit 1;
          }

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: ramsey/composer-install@v3

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('vendor/playwright-php/playwright/composer.json') }}

      - name: Install Playwright engine and browsers
        run: vendor/bin/playwright-install --with-deps

      - name: Unit tests
        run: vendor/bin/phpunit --testsuite Unit

      - name: Browser tests (fixture server, zero sleeps)
        run: vendor/bin/phpunit --testsuite Browser

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts-php${{ matrix.php }}
          path: |
            tests/Browser/screenshots
            tests/Browser/console
          if-no-files-found: ignore

  integration:
    name: Laravel ${{ matrix.laravel }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '^10.0'
            php: '8.2'
          - laravel: '^11.0'
            php: '8.3'
          - laravel: '^12.0'
            php: '8.4'
          - laravel: '^13.0'
            php: '8.4'
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-integration

      - name: Real-app integration test (base class swap only)
        run: scripts/integration-test.sh '${{ matrix.laravel }}'
