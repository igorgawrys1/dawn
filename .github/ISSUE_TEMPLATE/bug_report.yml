name: Bug report
description: A Dusk-compatible behaviour that Dawn gets wrong, or a crash.
labels: [bug]
body:
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Dawn / PHP / Laravel / OS
      placeholder: dawn 0.1.0, PHP 8.3, Laravel 11, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: test
    attributes:
      label: Failing test body
      description: >
        The smallest Dusk-style test body that reproduces the issue. If the
        same body behaves differently under laravel/dusk, say so - Dusk's
        behaviour is Dawn's spec.
      render: php
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Full error output / exception message.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
